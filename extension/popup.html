<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>YouTube AI Chat</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <div id="header">
    <span id="logo">AI</span>
    <div>
      <div id="title">Video Chat</div>
      <div id="status"><span class="dot" id="dot"></span><span id="status-text">Checking video...</span></div>
    </div>
  </div>

  <div id="answer">Open a YouTube video to get started.</div>

  <textarea id="question" placeholder="Ask anything about this video..."></textarea>

  <button id="ask">Send</button>

  <script src="popup.js"></script>

</body>
</html>
